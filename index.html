<html lang="fr">
<head>

<title>Mandala-Mantra — Générateur</title>
<style>
/* ── Variables ── */
:root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --gold: #d4a574;
    --text: #e8e8e8;
    --text2: #a0a0a0;
    --border: #2a2a4a;
    --success: #4caf50;
    --sun: #ffd700;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

/* ── Header ── */
.header {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    padding: 1.5rem 2rem;
    border-bottom: 2px solid var(--gold);
    text-align: center;
}
.header h1 {
    font-size: 1.8rem;
    color: var(--gold);
    letter-spacing: 0.1em;
}
.header p {
    color: var(--text2);
    margin-top: 0.3rem;
    font-size: 0.9rem;
}

/* ── Layout ── */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem;
}
.grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
}
@media (max-width: 1000px) {
    .grid-2 { grid-template-columns: 1fr; }
}

/* ── Panels ── */
.panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
}
.panel h2 {
    color: var(--gold);
    font-size: 1.1rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
}

/* ── Forms ── */
.form-row {
    display: grid;
    grid-template-columns: 140px 120px 80px;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.4rem;
    font-size: 0.85rem;
}
.form-row label {
    color: var(--text2);
    font-size: 0.8rem;
}
select, input[type="number"], input[type="text"], input[type="date"], input[type="time"] {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.35rem 0.5rem;
    font-size: 0.85rem;
}
select:focus, input:focus {
    outline: none;
    border-color: var(--gold);
}
.personal-info {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 0.4rem 0.8rem;
    margin-bottom: 1rem;
    font-size: 0.85rem;
}
.personal-info label {
    color: var(--text2);
    font-size: 0.8rem;
    text-align: right;
}
.personal-info input {
    width: 100%;
}

/* ── Buttons ── */
.btn-group {
    display: flex;
    gap: 0.6rem;
    margin-top: 1rem;
    flex-wrap: wrap;
}
.btn {
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
}
.btn-primary {
    background: var(--accent);
    color: white;
}
.btn-primary:hover { background: #c73a50; }
.btn-secondary {
    background: var(--surface2);
    color: var(--gold);
    border: 1px solid var(--gold);
}
.btn-secondary:hover { background: var(--gold); color: var(--bg); }
.btn-random {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
}
.btn-random:hover { background: var(--border); }

/* ── Results Table ── */
.results { display: none; margin-top: 1.5rem; }
.results.visible { display: block; }
.results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
}
.results-table th {
    background: var(--surface2);
    color: var(--gold);
    padding: 0.5rem;
    text-align: left;
    position: sticky;
    top: 0;
}
.results-table td {
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--border);
}
.results-table tr:hover {
    background: rgba(233, 69, 96, 0.1);
}
.results-table .hebrew {
    font-size: 1.1rem;
    direction: rtl;
    font-family: 'SBL Hebrew', 'Ezra SIL', 'Times New Roman', serif;
}
.total-row {
    background: var(--surface2);
    font-weight: bold;
    color: var(--gold);
}
.calc-direct { color: var(--sun); }
.calc-midpoint { color: var(--text2); }

/* ── Details ── */
.detail-section {
    margin-top: 1rem;
}
.detail-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 0.5rem;
    overflow: hidden;
}
.detail-header {
    padding: 0.6rem 0.8rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
}
.detail-header:hover { background: var(--surface2); }
.detail-header .arrow { transition: transform 0.2s; color: var(--text2); }
.detail-header.open .arrow { transform: rotate(90deg); }
.detail-body {
    display: none;
    padding: 0.8rem;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    line-height: 1.6;
}
.detail-body.open { display: block; }
.detail-body .label { color: var(--text2); }
.detail-body .hebrew-large {
    font-size: 1.6rem;
    direction: rtl;
    color: var(--gold);
    font-family: 'SBL Hebrew', 'Ezra SIL', 'Times New Roman', serif;
    margin: 0.3rem 0;
}
.detail-body .function {
    color: var(--accent);
    font-style: italic;
    margin-top: 0.4rem;
}

/* ── SVG Zodiac ── */
.svg-container {
    display: flex;
    justify-content: center;
    margin-top: 1rem;
}
.svg-container svg {
    max-width: 100%;
    height: auto;
}

/* ── Gematria Total ── */
.gematria-total {
    text-align: center;
    font-size: 1.3rem;
    color: var(--gold);
    margin: 1rem 0;
    padding: 0.8rem;
    background: var(--surface2);
    border-radius: 6px;
}

/* ── Footer ── */
.footer {
    text-align: center;
    padding: 1rem;
    color: var(--text2);
    font-size: 0.75rem;
    margin-top: 2rem;
}
</style>
</head>

function signDegreeToAbsolute(signFr, degreeInSign) {
    const sign = SIGNS.find(s => s.fr === signFr);
    if (!sign) return 0;
    return (sign.deg + parseFloat(degreeInSign)) % 360;
}

function absoluteToSignDegree(absDeg) {
    absDeg = ((absDeg % 360) + 360) % 360;
    const idx = Math.floor(absDeg / 30);
    const deg = absDeg - (idx * 30);
    return { sign: SIGNS[idx].fr, signEn: SIGNS[idx].en, degree: deg };
}

function midpoint(degA, degB) {
    const diff = Math.abs(degA - degB);
    let mid;
    if (diff > 180) {
        mid = (degA + degB) / 2 + 180;
    } else {
        mid = (degA + degB) / 2;
    }
    return ((mid % 360) + 360) % 360;
}

function degreeToShem72(absDeg) {
    absDeg = ((absDeg % 360) + 360) % 360;
    return Math.floor(absDeg / 5) + 1;
}

function getShem72(number) {
    return SHEM72.find(s => s.n === number) || null;
}

// Calcul gématria depuis les consonnes hébraïques
const CONSONANTS = {
    'א':1,'ב':2,'ג':3,'ד':4,'ה':5,'ו':6,'ז':7,'ח':8,'ט':9,'י':10,
    'כ':20,'ך':20,'ל':30,'מ':40,'ם':40,'נ':50,'ן':50,'ס':60,'ע':70,
    'פ':80,'ף':80,'צ':90,'ץ':90,'ק':100,'ר':200,'ש':300,'ת':400
};

function wordGematria(word) {
    let total = 0;
    for (const c of word) {
        total += CONSONANTS[c] || 0;
    }
    return total;
}

function randomPositions() {
    for (const body of BODIES) {
        const signIdx = Math.floor(Math.random() * 12);
        const deg = Math.round(Math.random() * 2999) / 100;
        document.getElementById(`sign-${body.id}`).value = SIGNS[signIdx].fr;
        document.getElementById(`deg-${body.id}`).value = deg;
    }
    calculate();
}

function randomNames() {
    // Place 14 Noms aléatoires directement (sans calcul de mi-points)
    const available = [...Array(72).keys()].map(i => i + 1);
    // Mélange Fisher-Yates
    for (let i = available.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [available[i], available[j]] = [available[j], available[i]];
    }
    const chosen = available.slice(0, 14);

    const components = [];
    for (let i = 0; i < 14; i++) {
        const shem = getShem72(chosen[i]);
        const body = BODIES[i];
        components.push({
            position: i + 1,
            body: body.id,
            bodyLabel: body.fr,
            calcType: 'aléatoire',
            resultDeg: shem.ds + 2.5,
            shem: shem,
            gematria: wordGematria(shem.h)
        });
    }

    currentResults = {
        name: document.getElementById('inp-name').value || 'Aléatoire',
        birthDate: document.getElementById('inp-date').value,
        birthTime: document.getElementById('inp-time').value,
        birthLocation: document.getElementById('inp-location').value,
        mode: 'random-names',
        components: components
    };

    displayResults();
}

function calculate() {
    const positions = {};
    for (const body of BODIES) {
        const sign = document.getElementById(`sign-${body.id}`).value;
        const deg = parseFloat(document.getElementById(`deg-${body.id}`).value) || 0;
        positions[body.id] = { sign, degree: deg, absolute: signDegreeToAbsolute(sign, deg) };
    }

    const sunDeg = positions["Soleil"].absolute;
    const components = [];

    for (let i = 0; i < BODIES.length; i++) {
        const body = BODIES[i];
        let calcType, resultDeg;

        if (body.id === "Soleil") {
            calcType = "direct";
            resultDeg = sunDeg;
        } else {
            calcType = "mi-point";
            resultDeg = midpoint(sunDeg, positions[body.id].absolute);
        }

        const shemNum = degreeToShem72(resultDeg);
        const shem = getShem72(shemNum);
        const sd = absoluteToSignDegree(resultDeg);

        components.push({
            position: i + 1,
            body: body.id,
            bodyLabel: body.fr,
            calcType: calcType,
            resultDeg: resultDeg,
            resultSign: sd.sign,
            shem: shem,
            gematria: wordGematria(shem.h)
        });
    }

    currentResults = {
        name: document.getElementById('inp-name').value || 'Sans nom',
        birthDate: document.getElementById('inp-date').value,
        birthTime: document.getElementById('inp-time').value,
        birthLocation: document.getElementById('inp-location').value,
        mode: 'calculated',
        components: components
    };

    displayResults();
}

                <span>[${c.position}] ${c.bodyLabel} — <strong>${c.shem.tr}</strong> (#${c.shem.n})</span>
                <span class="arrow">▶</span>
            </div>
            <div class="detail-body">
                <div class="hebrew-large">${c.shem.h}</div>
                <p><span class="label">Translittération :</span> ${c.shem.tr}</p>
                <p><span class="label">Signe :</span> ${c.shem.s} (${c.shem.ds}°–${c.shem.de}°) — ${c.shem.na}</p>
                <p><span class="label">Voyelles :</span> ${c.shem.v}</p>
                <p><span class="label">Gématria :</span> ${c.gematria}</p>
                <p><span class="label">Trimestre :</span> ${c.shem.tm}</p>
                <p><span class="label">Calcul :</span> ${calcInfo}</p>
                <p class="function">${c.shem.ff}</p>
            </div>
        </div>`;
    }

    details.innerHTML = detailsHtml;

    // SVG
    drawMandala();

    // Scroll to results
    section.scrollIntoView({ behavior: 'smooth' });
}

function toggleDetail(el) {
    el.classList.toggle('open');
    el.nextElementSibling.classList.toggle('open');
}

// ══════════════════════════════════════════════════════════════════════════
// VISUALISATION SVG — MANDALA CIRCULAIRE
// ══════════════════════════════════════════════════════════════════════════

function drawMandala() {
    if (!currentResults) return;

    const size = 600;
    const cx = size / 2;
    const cy = 280; // centre légèrement haut pour laisser place aux 4 Noms en bas
    const rCircle = 200; // rayon du cercle principal
    const rCrown = 160; // rayon pour le texte hébreu de la couronne
    const rLabel = 230;  // rayon pour les labels corps célestes

    const bodyColors = [
        '#ffd700', // Soleil
        '#c0c0c0', // Lune
        '#4a9eff', // Mercure
        '#ff69b4', // Vénus
        '#ff4444', // Mars
        '#ff8c00', // Jupiter
        '#8b8b00', // Saturne
        '#00ced1', // Uranus
        '#4169e1', // Neptune
        '#8b008b', // Pluton
        '#90ee90', // Noeud Nord
        '#90ee90', // Noeud Sud
        '#dda0dd', // Ascendant
        '#f0e68c'  // MC
    ];

    let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;

    // Fond
    svg += `<rect width="${size}" height="${size}" fill="#0d1117"/>`;

    // Cercle principal blanc (contour)
    svg += `<circle cx="${cx}" cy="${cy}" r="${rCircle}" fill="none" stroke="#e8e8e8" stroke-width="2"/>`;

    // Cercle intérieur doré (pour le centre)
    svg += `<circle cx="${cx}" cy="${cy}" r="55" fill="#16213e" stroke="#d4a574" stroke-width="1.5"/>`;

    // ── Centre : N1 (Soleil) + N2 (Lune) ──
    if (currentResults.components.length >= 2) {
        const n1 = currentResults.components[0]; // Soleil
        const n2 = currentResults.components[1]; // Lune

        // Noms hébreux au centre (RTL)
        svg += `<text x="${cx}" y="${cy - 10}" text-anchor="middle" dominant-baseline="central" fill="${bodyColors[0]}" font-size="22" font-family="'SBL Hebrew','Ezra SIL','Times New Roman',serif" direction="rtl">${n1.shem.h}</text>`;
        svg += `<text x="${cx}" y="${cy + 16}" text-anchor="middle" dominant-baseline="central" fill="${bodyColors[1]}" font-size="22" font-family="'SBL Hebrew','Ezra SIL','Times New Roman',serif" direction="rtl">${n2.shem.h}</text>`;

        // Labels petits
        svg += `<text x="${cx}" y="${cy - 28}" text-anchor="middle" fill="${bodyColors[0]}" font-size="8" opacity="0.7">Soleil</text>`;
        svg += `<text x="${cx}" y="${cy + 34}" text-anchor="middle" fill="${bodyColors[1]}" font-size="8" opacity="0.7">Lune</text>`;
    }

    // ── Couronne : N3–N10 (Mercure → Pluton) — 8 Noms sur le cercle ──
    // Texte hébreu horizontal positionné autour du cercle
    const crownNames = currentResults.components.slice(2, 10);
    for (let i = 0; i < crownNames.length; i++) {
        const c = crownNames[i];
        const angleDeg = i * 45 - 90; // 0=haut, 45° entre chaque
        const angleRad = (angleDeg * Math.PI) / 180;

        // Position du marqueur sur le cercle
        const px = cx + rCircle * Math.cos(angleRad);
        const py = cy + rCircle * Math.sin(angleRad);

        // Petit marqueur sur le cercle
        svg += `<circle cx="${px}" cy="${py}" r="4" fill="${bodyColors[i + 2]}" stroke="#fff" stroke-width="0.5"/>`;

        // Texte hébreu horizontal entre le cercle et le centre
        const hx = cx + rCrown * Math.cos(angleRad);
        const hy = cy + rCrown * Math.sin(angleRad);
        svg += `<text x="${hx}" y="${hy}" text-anchor="middle" dominant-baseline="central" fill="${bodyColors[i + 2]}" font-size="18" font-family="'SBL Hebrew','Ezra SIL','Times New Roman',serif" direction="rtl">${c.shem.h}</text>`;

        // Label du corps céleste (à l'extérieur du cercle)
        const lx = cx + rLabel * Math.cos(angleRad);
        const ly = cy + rLabel * Math.sin(angleRad);
        const shortLabel = c.body.replace('Noeud ', 'N.').replace('Ascendant', 'Asc');
        svg += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" fill="${bodyColors[i + 2]}" font-size="9" opacity="0.8">${shortLabel}</text>`;
    }

    // ── Bas du mandala : N11–N14 (Noeud Nord → MC) ──
    const bottomNames = currentResults.components.slice(10, 14);
    const bottomY = cy + rCircle + 60;
    const bottomSpacing = 130;
    const bottomStartX = cx - (bottomNames.length - 1) * bottomSpacing / 2;

    for (let i = 0; i < bottomNames.length; i++) {
        const c = bottomNames[i];
        const bx = bottomStartX + i * bottomSpacing;

        // Nom hébreu
        svg += `<text x="${bx}" y="${bottomY}" text-anchor="middle" dominant-baseline="central" fill="${bodyColors[i + 10]}" font-size="18" font-family="'SBL Hebrew','Ezra SIL','Times New Roman',serif" direction="rtl">${c.shem.h}</text>`;

        // Label corps céleste
        const shortLabel = c.body.replace('Noeud ', 'N.').replace('Ascendant', 'Asc');
        svg += `<text x="${bx}" y="${bottomY + 18}" text-anchor="middle" fill="${bodyColors[i + 10]}" font-size="8" opacity="0.7">${shortLabel}</text>`;

        // Translittération
        svg += `<text x="${bx}" y="${bottomY - 18}" text-anchor="middle" fill="#a0a0a0" font-size="8">${c.shem.tr}</text>`;
    }

    // Titre sous le cercle
    svg += `<text x="${cx}" y="${cy + rCircle + 25}" text-anchor="middle" fill="#d4a574" font-size="10" letter-spacing="0.2em">M A N D A L A — M A N T R A</text>`;

    svg += `</svg>`;

    document.getElementById('svg-mandala').innerHTML = svg;

    // Footer info
    const footer = document.getElementById('mandala-footer');
    if (currentResults.mode === 'random-names') {
        footer.innerHTML = '<span style="color:var(--accent); font-size:0.8rem;">14 Noms aléatoires</span>';
    } else {
        footer.innerHTML = '<span style="color:var(--text2); font-size:0.8rem;">Mi-points solaires — Seconde itération</span>';
    }
}

// ══════════════════════════════════════════════════════════════════════════
// EXPORT MARKDOWN
// ══════════════════════════════════════════════════════════════════════════

function exportMarkdown() {
    if (!currentResults) {
        alert('Calculez d\'abord un mandala-mantra.');
        return;
    }

    const r = currentResults;
    let md = `# Mandala-Mantra de ${r.name}\n\n`;
    md += `**Date de création** : ${new Date().toLocaleDateString('fr-FR')}\n`;
    md += `**Itération** : Seconde (14 Noms — mi-points solaires)\n`;

    if (r.birthDate) {
        md += `**Naissance** : ${r.birthDate}`;
        if (r.birthTime) md += ` ${r.birthTime}`;
        if (r.birthLocation) md += ` — ${r.birthLocation}`;
        md += `\n`;
    }

    if (r.mode === 'random-names') {
        md += `**Mode** : 14 Noms aléatoires (exploration)\n`;
    }

    md += `\n---\n\n`;
    md += `## Tableau récapitulatif\n\n`;
    md += `| # | Corps céleste | Nom | Hébreu | Signe | Gématria |\n`;
    md += `|--:|:-------------|:-----|:-------|:------|--------:|\n`;

    let total = 0;
    for (const c of r.components) {
        total += c.gematria;
        md += `| ${c.position} | ${c.body} | ${c.shem.tr} | ${c.shem.h} | ${c.shem.s} ${c.shem.ds}°–${c.shem.de}° | ${c.gematria} |\n`;
    }
    md += `| | | | | **Total** | **${total}** |\n`;

    md += `\n---\n\n`;
    md += `## Les 14 Noms du mandala-mantra\n\n`;

    for (const c of r.components) {
        md += `### ${c.position}. ${c.bodyLabel}\n\n`;
        md += `**Nom #${c.shem.n}** : ${c.shem.h} — **${c.shem.tr}**\n\n`;
        md += `- **Signe** : ${c.shem.s} (${c.shem.ds}°–${c.shem.de}°) — ${c.shem.na}\n`;
        md += `- **Voyelles** : ${c.shem.v}\n`;
        md += `- **Gématria** : ${c.gematria}\n`;
        md += `- **Trimestre** : ${c.shem.tm}\n`;

        const calcInfo = c.calcType === 'direct' ? 'Position directe du Soleil' :
                         c.calcType === 'aléatoire' ? 'Placement aléatoire' :
                         `Mi-point Soleil ↔ ${c.body} → ${c.resultDeg.toFixed(2)}°`;
        md += `- **Calcul** : ${calcInfo}\n\n`;
        md += `> **Fonction vibratoire** : ${c.shem.ff}\n\n`;
        md += `---\n\n`;
    }

    md += `*Document généré le ${new Date().toISOString().slice(0, 16)} par mandala-mantra v2*\n`;

    // Télécharger
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const safeName = r.name.replace(/[^a-zA-Z0-9À-ÿ]/g, '_');
    const filename = `MM_${safeName}_fr.md`;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);

    // Notification
    const note = document.createElement('div');
    note.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface2);color:var(--gold);padding:0.8rem 1.2rem;border-radius:6px;border:1px solid var(--gold);font-size:0.85rem;z-index:999;max-width:400px;';
    note.innerHTML = `<strong>${filename}</strong> téléchargé.<br><span style="color:var(--text2);font-size:0.8rem;">→ Déplacez-le dans <code>Output/</code> pour archivage.</span>`;
    document.body.appendChild(note);
    setTimeout(() => note.remove(), 5000);
}
